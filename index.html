<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Letter Wordle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .tile {
            aspect-ratio: 1;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            transition: all 0.1s ease;
            text-transform: uppercase;
        }

        .tile.filled {
            border-color: #999;
            background: #f5f5f5;
        }

        .tile.correct {
            background: #6aaa64;
            color: white;
            border-color: #6aaa64;
        }

        .tile.present {
            background: #c8b458;
            color: white;
            border-color: #c8b458;
        }

        .tile.absent {
            background: #787c7e;
            color: white;
            border-color: #787c7e;
        }

        .message {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            min-height: 24px;
        }

        .message.win {
            color: #6aaa64;
        }

        .message.loss {
            color: #c8b458;
        }

        .message.info {
            color: #667eea;
            font-size: 14px;
            font-weight: normal;
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(35px, 1fr));
            gap: 6px;
            margin-bottom: 20px;
        }

        .key {
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #d3d6da;
            color: #1a1a1a;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s ease;
            text-transform: uppercase;
        }

        .key:hover:not(:disabled) {
            background: #b5bdc1;
        }

        .key:active:not(:disabled) {
            transform: scale(0.95);
        }

        .key.correct {
            background: #6aaa64;
            color: white;
        }

        .key.present {
            background: #c8b458;
            color: white;
        }

        .key.absent {
            background: #787c7e;
            color: white;
        }

        .key:disabled {
            opacity: 0.5;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-submit:hover:not(:disabled) {
            background: #5568d3;
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #f5f5f5;
            color: #333;
            flex: 1;
        }

        .btn-reset:hover {
            background: #e5e5e5;
        }

        .stats {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 16px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 16px;
            }

            h1 {
                font-size: 24px;
            }

            .tile {
                font-size: 18px;
            }

            button {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔤 Double Wordle</h1>
        <p class="subtitle">Words can have 1+ sets of double letters</p>

        <div class="message" id="message"></div>

        <div class="game-board" id="gameBoard"></div>

        <div class="keyboard" id="keyboard"></div>

        <div class="controls">
            <button class="btn-submit" id="submitBtn">Submit</button>
            <button class="btn-reset" id="resetBtn">New Game</button>
        </div>

        <div class="stats" id="stats"></div>
    </div>

    <script>
        const WORDS = [

            'BERRY', 'BILLY', 'BLEED', 'BLISS', 'BLOOD', 'BLOOM', 'BLUFF', 'BOBBY',

            'HOBBY', 'HOLLY', 'HOOPS', 'HORNY', 'HUFFS', 'HUFFY', 'HULLS', 'HUMPH',
            'HURLS', 'HURRY', 'HUSSY', 'IGLOO', 'IMPLY', 'INNER', 'ISSUE', 'JELLY',
            'JIFFY', 'JILLS', 'JOLLY', 'JOUST', 'JUGGLE', 'JUNCO', 'JUNKY', 'KAPPA',

            'LEANS', 'LEAPS', 'LEASE', 'LEASH', 'LEAST', 'LEECH', 'LEEKS', 'LEMON',
            'LEMUR', 'LENDS', 'LESS', 'LESSEN', 'LESSON', 'LETTER', 'LEVEL', 'LEVEE',
            'LEWIS', 'LIBEL', 'LICKS', 'LIFER', 'LIFTS', 'LIMBS', 'LIMEN', 'LIMES',
            'LIMIT', 'LIMPS', 'LINES', 'LINGO', 'LINKS', 'LIONS', 'LISPS', 'LITTER',

            'LOCKS', 'LOFTS', 'LOFTY', 'LOINS', 'LOLLS', 'LOLLY', 'LONER', 'LONGS',
            'LOOKS', 'LOOMS', 'LOONS', 'LOOPS', 'LOOPY', 'LOOSE', 'LORDS', 'LOSER',

            'LOUSY', 'LOUTS', 'LOVED', 'LOVER', 'LOVES', 'LOWER', 'LOYAL', 'LUCID',

            'LUSKS', 'LUSTS', 'LUSTY', 'LUTES', 'LYING', 'LYMPH', 'LYNCH', 'LYRIC',
            'MADLY', 'MAGMA', 'MAILS', 'MAIMS', 'MAKES', 'MALTS', 'MAMMY', 'MAMMA',
            'MANES', 'MANGE', 'MANGO', 'MANLY', 'MANNA', 'MANOR', 'MAPLE', 'MARKS',
            'MARRY', 'MARSH', 'MASSY', 'MATCH', 'MATTE', 'MAULS', 'MAXIM', 'MEALS',
            'MEALY', 'MEANS', 'MEATS', 'MEATY', 'MELEE', 'MELON', 'MELTS', 'MEMES',
            'MENDS', 'MENUS', 'MERCY', 'MERGE', 'MERIT', 'MERRY', 'MESSY', 'METAL',
            'METER', 'METHS', 'MIFFY', 'MILKS', 'MILKY', 'MILLS', 'MILLY', 'MIMIC',
            'MINCE', 'MINDS', 'MINES', 'MINGY', 'MINKS', 'MINNY', 'MINOR', 'MINTS',
            'MINTY', 'MINUS', 'MIRED', 'MIRES', 'MIRKS', 'MISDO', 'MISER', 'MISSES',
            'MISSY', 'MISTS', 'MISTY', 'MITER', 'MITRE', 'MITTS', 'MIXES', 'MOANS',
            'MOATS', 'MOCKS', 'MODAL', 'MODEL', 'MODEM', 'MODES', 'MOGUL', 'MOILS',
            'MOIST', 'MOLLS', 'MOLLY', 'MOLTS', 'MOMMY', 'MONAD', 'MONAL', 'MONEY',
            'MONKS', 'MONTE', 'MONTH', 'MOOCH', 'MOODS', 'MOODY', 'MOOLA', 'MOOSE',
            'MOPED', 'MOPES', 'MORAL', 'MORAS', 'MORAY', 'MORSE', 'MORNS', 'MORPH',
            'MOSEY', 'MOSSY', 'MOTEL', 'MOTHS', 'MOTHY', 'MOTIF', 'MOTOR', 'MOTTO',
            'MOULD', 'MOULT', 'MOUND', 'MOUNT', 'MOURN', 'MOUSE', 'MOUSY', 'MOUTH',
            'MOVED', 'MOVER', 'MOVES', 'MOVIE', 'MOWED', 'MOWER', 'MOXIE', 'MUCID',
            'MUCUS', 'MUDDY', 'MUFFS', 'MUFFY', 'MUGGY', 'MULED', 'MULES', 'MULLS',
            'MULLA', 'MUMMY', 'MUMPS', 'MUNCH', 'MURAL', 'MUREX', 'MURKY', 'MURRE',
            'MUSCA', 'MUSED', 'MUSES', 'MUSHY', 'MUSIC', 'MUSKS', 'MUSKY', 'MUSSY',
            'MUSTS', 'MUSTY', 'MUTCH', 'MUTES', 'MUTTS', 'MUZZY', 'NABLA', 'NACHO',
            'NACRE', 'NADDY', 'NADIR', 'NAFFS', 'NAFFY', 'NAGGY', 'NAIAD', 'NAILS',
            'NAIRU', 'NALED', 'NALES', 'NALLA', 'NALLS', 'NAMER', 'NAMED', 'NAMES',
            'NANNA', 'NANNY', 'NAPAS', 'NAPED', 'NAPES', 'NAPPA', 'NAPPE', 'NAPPY',
            'NARCS', 'NARDY', 'NARES', 'NARKS', 'NARKY', 'NASAL', 'NASTY', 'NATAL',
            'NATES', 'NATTY', 'NAUCH', 'NAVAL', 'NAVES', 'NAWAB', 'NAWED', 'NAZIS',
            'NEAPS', 'NEARS', 'NEATS', 'NECKS', 'NEDDY', 'NEEDS', 'NEEDY', 'NEELE',
            'NEFFS', 'NEIGH', 'NELKS', 'NELLY', 'NEMAS', 'NEMMY', 'NENAL', 'NENES',
            'NEPAL', 'NEPIT', 'NEPER', 'NEPPE', 'NERDS', 'NERDY', 'NERKS', 'NERKY',
            'NERMS', 'NERMY', 'NERTS', 'NERTZ', 'NERVE', 'NERVY', 'NESAL', 'NESIS',
            'NESTS', 'NESSY', 'NESTS', 'NETAS', 'NETOP', 'NETOP', 'NETOP', 'NETOP',
            'NETOP', 'NETOP', 'NETOP', 'NETOP', 'NETOP', 'NETOP', 'NETOP', 'NETOP'
        ];

        const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        const MAX_GUESSES = 6;

        let targetWord = '';
        let currentGuess = '';
        let guesses = [];
        let gameOver = false;
        let gameWon = false;
        let letterStates = {};

        function initGame() {
            targetWord = WORDS[Math.floor(Math.random() * WORDS.length)];
            currentGuess = '';
            guesses = [];
            gameOver = false;
            gameWon = false;
            letterStates = {};
            renderBoard();
            renderKeyboard();
            updateMessage('');
        }

        function renderBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            for (let row = 0; row < MAX_GUESSES; row++) {
                for (let col = 0; col < 5; col++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';

                    const letter = guesses[row] ? guesses[row][col] : '';
                    const state = guesses[row] ? getLetterState(guesses[row], col) : '';

                    if (row === guesses.length && currentGuess.length > col) {
                        tile.textContent = currentGuess[col];
                        tile.classList.add('filled');
                    } else if (guesses[row]) {
                        tile.textContent = letter;
                        tile.classList.add(state);
                    }

                    board.appendChild(tile);
                }
            }
        }

        function getLetterState(guess, position) {
            const letter = guess[position];

            if (targetWord[position] === letter) {
                return 'correct';
            } else if (targetWord.includes(letter)) {
                return 'present';
            } else {
                return 'absent';
            }
        }

        function renderKeyboard() {
            const keyboard = document.getElementById('keyboard');
            keyboard.innerHTML = '';

            ALPHABET.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.textContent = letter;
                btn.disabled = gameOver;

                if (letterStates[letter]) {
                    btn.classList.add(letterStates[letter]);
                }

                btn.addEventListener('click', () => addLetter(letter));
                keyboard.appendChild(btn);
            });
        }

        function addLetter(letter) {
            if (currentGuess.length < 5 && !gameOver) {
                currentGuess += letter;
                renderBoard();
            }
        }

        function removeLetter() {
            currentGuess = currentGuess.slice(0, -1);
            renderBoard();
        }

        function submitGuess() {
            if (currentGuess.length !== 5) {
                updateMessage('Word must be 5 letters', 'info');
                return;
            }

            if (!WORDS.includes(currentGuess)) {
                updateMessage('Word not in list', 'info');
                return;
            }

            guesses.push(currentGuess);

            for (let i = 0; i < 5; i++) {
                const letter = currentGuess[i];
                const state = getLetterState(currentGuess, i);

                if (state === 'correct' && letterStates[letter] !== 'correct') {
                    letterStates[letter] = 'correct';
                } else if (state === 'present' && letterStates[letter] !== 'correct') {
                    letterStates[letter] = 'present';
                } else if (!letterStates[letter]) {
                    letterStates[letter] = 'absent';
                }
            }

            if (currentGuess === targetWord) {
                gameWon = true;
                gameOver = true;
                updateMessage(`You won in ${guesses.length} ${guesses.length === 1 ? 'guess' : 'guesses'}! 🎉`, 'win');
            } else if (guesses.length === MAX_GUESSES) {
                gameOver = true;
                updateMessage(`Game over! The word was ${targetWord}`, 'loss');
            } else {
                updateMessage('');
            }

            currentGuess = '';
            renderBoard();
            renderKeyboard();
        }

        function updateMessage(text, className = '') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message ' + className;
        }

        document.getElementById('submitBtn').addEventListener('click', submitGuess);
        document.getElementById('resetBtn').addEventListener('click', initGame);

        document.addEventListener('keydown', (e) => {
            if (gameOver) return;

            const letter = e.key.toUpperCase();
            if (ALPHABET.includes(letter)) {
                addLetter(letter);
            } else if (e.key === 'Enter') {
                submitGuess();
            } else if (e.key === 'Backspace') {
                removeLetter();
            }
        });

        initGame();
    </script>
</body>
</html>
